<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <rect width="56" height="56" rx="12" fill="#1B5E20"/>
  <g transform="translate(8,8)">
    <!-- Folded towel shape -->
    <rect x="6" y="10" width="28" height="24" rx="3" fill="#fff" opacity="0.9"/>
    <rect x="10" y="14" width="20" height="16" rx="2" fill="#4CAF50" opacity="0.6"/>
    <rect x="6" y="10" width="28" height="8" rx="3" fill="#fff"/>
    <line x1="10" y1="14" x2="30" y2="14" stroke="#1B5E20" stroke-width="0.5" opacity="0.3"/>
    <!-- Decorative stripe on towel -->
    <rect x="6" y="30" width="28" height="4" rx="1" fill="#FF6D00" opacity="0.8"/>
    <!-- Small rolled towel on top -->
    <ellipse cx="20" cy="8" rx="8" ry="4" fill="#fff" opacity="0.85"/>
    <ellipse cx="20" cy="8" rx="5" ry="2.5" fill="#4CAF50" opacity="0.4"/>
  </g>
</svg>
